display_information:
  name: Loop
  description: Audio-first async feedback + decision artifacts
  background_color: "#0a0a0c"
features:
  bot_user:
    display_name: Loop
    always_online: false
  slash_commands:
    - command: /loop
      url: ${APP_BASE_URL}/api/slack/commands
      description: Capture notes or request async feedback
      usage_hint: "note <text> | request | record"
      should_escape: false
oauth_config:
  redirect_urls:
    - ${APP_BASE_URL}/api/slack/oauth/callback
  scopes:
    bot:
      - commands
      - chat:write
      - app_mentions:read
settings:
  event_subscriptions:
    request_url: ${APP_BASE_URL}/api/slack/events
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
    request_url: ${APP_BASE_URL}/api/slack/interactive
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false

